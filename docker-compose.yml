services:
  frontend:
    container_name: gestao-metas-frontend
    build:
      context: ./Front
      dockerfile: Dockerfile
      target: prod
      args:
        NEXT_PUBLIC_API_URL: http://backend:${BACKEND_PORT:-3001}
        BACKEND_PORT: ${BACKEND_PORT:-3001}
    environment:
      # Dentro da rede do Compose o frontend deve falar com o servico backend.
      NEXT_PUBLIC_API_URL: http://backend:${BACKEND_PORT:-3001}
      NODE_ENV: production
      PORT: ${FRONTEND_PORT:-3000}
    ports:
      - "${FRONTEND_HOST_PORT:-3002}:${FRONTEND_PORT:-3000}"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:' + (process.env.PORT || 3000)).then((res) => process.exit(res.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 45s
    restart: unless-stopped
    networks:
      - app_net

  backend:
    container_name: gestao-metas-backend
    build:
      context: ./Back
      dockerfile: Dockerfile
      target: prod
    env_file:
      - ./Back/.env
    environment:
      NODE_ENV: production
      PORT: ${BACKEND_PORT:-3001}

      # Oracle legado vem de Back/.env. Nao defina placeholders aqui,
      # senao o Compose sobrescreve as credenciais reais do env_file.
      # MySQL Central (multi-tenant)
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_USER: ${MYSQL_USER:-app_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-change_me}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-gestao_metas}
      MYSQL_ADMIN_HOST: mysql
      MYSQL_ADMIN_PORT: 3306
      MYSQL_ADMIN_USER: ${MYSQL_ROOT_USER:-root}
      MYSQL_ADMIN_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root_change_me}
      MYSQL_GRANT_USER: ${MYSQL_USER:-app_user}
      MYSQL_USER_HOST: ${MYSQL_USER_HOST:-10.100.10.%}
      # Auth JWT
      AUTH_TOKEN_SECRET: ${AUTH_TOKEN_SECRET:-sip-auth-secret-2026-troque-em-producao}
      AUTH_COOKIE_NAME: ${AUTH_COOKIE_NAME:-sip_auth}
      APP_ENCRYPTION_KEY: ${APP_ENCRYPTION_KEY:-a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4e5f6a1b2}
      # Superadmin inicial
      SUPERADMIN_INITIAL_LOGIN: ${SUPERADMIN_INITIAL_LOGIN:-admin}
      SUPERADMIN_INITIAL_PASSWORD: ${SUPERADMIN_INITIAL_PASSWORD:-Admin@2026}
      ALLOW_DESTRUCTIVE_ORG_DELETE: ${ALLOW_DESTRUCTIVE_ORG_DELETE:-false}
    ports:
      - "${BACKEND_HOST_PORT:-3001}:${BACKEND_PORT:-3001}"
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:' + (process.env.PORT || 3001) + '/api/health').then((res) => process.exit(res.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
    restart: unless-stopped
    networks:
      - app_net

  mysql:
    container_name: gestao-metas-mysql
    image: mysql:8.4
    environment:
      # Banco base para desenvolvimento local. 
      MYSQL_DATABASE: ${MYSQL_DATABASE:-gestao_metas}
      MYSQL_USER: ${MYSQL_USER:-app_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-change_me}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root_change_me}
    ports:
      - "${MYSQL_HOST_PORT:-3307}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u root -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped
    networks:
      - app_net


  prefect-worker:
    container_name: gestao-metas-prefect
    build:
      context: ./Back
      dockerfile: jobs/Dockerfile
    env_file:
      - ./Back/.env
    environment:
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_USER: ${MYSQL_USER:-app_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-change_me}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-gestao_metas}
      APP_ENCRYPTION_KEY: ${APP_ENCRYPTION_KEY:-a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4e5f6a1b2}
      PREFECT_VALIDATION_INTERVAL_SECONDS: ${PREFECT_VALIDATION_INTERVAL_SECONDS:-1800}
    depends_on:
      mysql:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - app_net

networks:
  app_net:
    name: gestao_metas_app_net
    driver: bridge
    ipam:
      config:
        - subnet: 10.100.10.0/24
          gateway: 10.100.10.1

volumes:
  mysql_data:
